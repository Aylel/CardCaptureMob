plugins {
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
}

archivesBaseName = "CardCaptureMobLevelsAndStats"
version = '1.0'
group = 'com.aylel.cardcapturemoblevelsandstats'

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

minecraft {
    mappings channel: 'official', version: '1.20.1'
    runs {
        client {
            workingDirectory project.file('../run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            mods {
                cardcapturemob {
                    source project(':core').sourceSets.main
                }
                cardcapturemoblevelsandstats {
                    source sourceSets.main
                }
            }
        }
    }
}


dependencies {
    minecraft 'net.minecraftforge:forge:1.20.1-47.2.17'
}

tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [
            minecraft_version: '1.20.1',
            forge_version: '47.2.17',
            mod_id: 'cardcapturemoblevelsandstats',
            mod_name: 'CardCaptureMob Levels And Stats',
            mod_license: 'All rights reserved',
            mod_version: '1.0',
            mod_authors: 'Aylel',
            mod_description: 'Module additionnel pour gestion des niveaux et statistiques dans CardCaptureMob.',
    ]
    inputs.properties replaceProperties
    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties + [project: project]
    }
}
